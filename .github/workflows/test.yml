name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      FIRESTORE_ENABLED: "false"
      DATABASE_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -m pytest -v
