# Table Rock Tools — on-prem nginx (containerized)
#
# Topology: docker-compose.prod.yml runs this config in the `toolbox-nginx`
# container on the `toolbox_default` bridge network. Upstream is the `app`
# service (uvicorn on :8080) resolved via docker DNS.
#
# Today this serves HTTP only. The server is reachable via VPN + SSH tunnel
# (`ssh -L 8080:localhost:80 table-rock-admin@10.0.2.3`) and does not yet
# have a Let's Encrypt cert — DNS for tools.tablerocktx.com currently
# points at Cloud Run, not this box.
#
# When DNS flips (either a staging subdomain or the full cutover to
# tools.tablerocktx.com), obtain a cert with the certbot sidecar:
#
#   docker compose -f docker-compose.prod.yml run --rm certbot certonly \
#     --webroot -w /var/www/certbot -d <hostname> \
#     --email <email> --agree-tos --no-eff-email
#
# Then uncomment the HTTPS server block below, update server_name, and
# `docker compose exec nginx nginx -s reload`.

server {
    listen 80;
    server_name _;

    # Certbot ACME HTTP-01 challenge — leave this in place so future
    # `certbot renew` and initial issuance work without config changes.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Proration endpoints (long-running RRC queries + NDJSON streaming) ──
    location /api/proration/ {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for RRC downloads and CSV imports (220K+ records).
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;

        # Disable buffering for NDJSON streaming (fetch-missing endpoint).
        proxy_buffering off;
        proxy_cache off;
    }

    # ── GHL send endpoint (SSE progress stream) ──
    location /api/ghl/send/ {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requires no buffering and long read timeout.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Pipeline endpoints (long-running AI inference via Ollama) ──
    location /api/pipeline/ {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI cleanup/validate/enrich batches on 9B-class models can take
        # several minutes per request; extend upstream timeouts accordingly.
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Revenue endpoints (NDJSON streaming for multi-PDF upload) ──
    location /api/revenue/ {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # StreamingResponse delivers per-PDF progress ticks; disable
        # nginx buffering so the client sees updates as they happen.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Default: all other routes (frontend SPA, standard API calls) ──
    location / {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Match backend's MAX_UPLOAD_SIZE_MB default.
        client_max_body_size 50M;

        # Standard timeout for most endpoints.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Keep the SPA feeling snappy — no buffering on the default path
        # so streamed responses (e.g. job progress from tools not covered
        # above) reach the browser promptly.
        proxy_buffering off;
    }
}

# ── HTTPS server (disabled until a cert exists) ─────────────────────────
#
# Enable this block once certbot has issued a certificate. Uncomment the
# block, set server_name to the hostname, and add a `return 301` to the
# HTTP server above to force redirect.
#
# server {
#     listen 443 ssl http2;
#     server_name tools.tablerocktx.com;  # or staging subdomain
#
#     ssl_certificate     /etc/letsencrypt/live/tools.tablerocktx.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/tools.tablerocktx.com/privkey.pem;
#
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#     ssl_session_cache shared:SSL:10m;
#
#     add_header X-Frame-Options DENY;
#     add_header X-Content-Type-Options nosniff;
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#
#     # Copy the `location` blocks from the HTTP server above (proration,
#     # ghl/send, pipeline, revenue, and `/`). Same upstream, same timeouts.
# }
