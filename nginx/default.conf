# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name tools.tablerocktx.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name tools.tablerocktx.com;

    # SSL certificates (adjust paths for your deployment)
    ssl_certificate     /opt/tablerock/certs/server.crt;
    ssl_certificate_key /opt/tablerock/certs/server.key;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # File upload size limit (matches backend MAX_UPLOAD_SIZE_MB)
    client_max_body_size 50M;

    # ── Proration endpoints (long-running RRC queries + streaming) ──
    location /api/proration/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for RRC downloads and CSV imports (220K+ records)
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;

        # Disable buffering for NDJSON streaming (fetch-missing endpoint)
        proxy_buffering off;
        proxy_cache off;
    }

    # ── GHL send endpoint (SSE progress stream) ──
    location /api/ghl/send/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requires no buffering and long read timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Pipeline endpoints (long-running AI inference via Ollama) ──
    location /api/pipeline/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI cleanup/validate/enrich batches on 9B-class models can take
        # several minutes per request; extend upstream timeouts accordingly.
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Revenue endpoints (NDJSON streaming for multi-PDF upload) ──
    location /api/revenue/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # StreamingResponse delivers per-PDF progress ticks; disable
        # nginx buffering so the client sees updates as they happen.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Default: all other routes ──
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeout for most endpoints
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Logging
    access_log /opt/tablerock/logs/nginx-access.log;
    error_log  /opt/tablerock/logs/nginx-error.log;
}
